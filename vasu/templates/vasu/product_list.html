<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .card {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
        }
        img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<h1>Product Listing</h1>

<div class="container">
    {% for product in products %}
        <div class="card">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
            <h3>{{ product.name }}</h3>
            <p>₹ {{ product.price }}</p>
            <p>{{ product.description|truncatechars:50 }}</p>
        </div>
    {% endfor %}
</div>

</body>
</html>
